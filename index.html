<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vayuputra - Under Construction</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 20px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        h2 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #38bdf8;
        }

        p {
            font-size: 1rem;
            margin-bottom: 30px;
            color: #cbd5f5;
        }

        .loader {
            width: 50px;
            height: 50px;
            border: 5px solid #334155;
            border-top: 5px solid #38bdf8;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .footer {
            margin-top: 30px;
            font-size: 0.9rem;
            color: #94a3b8;
        }

        .brand {
            color: #38bdf8;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🚧 Under Construction</h1>
        <h2>Team Vayuputra</h2>

        <p>
            We're building something awesome in the sky ✈️<br>
            Stay tuned for updates!
        </p>

        <div class="loader"></div>

        <div class="footer">
            © 2026 <span class="brand">Vayuputra</span>. All rights reserved.
        </div>
    </div>

</body>
</html>
